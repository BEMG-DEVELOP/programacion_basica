<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piedra Papel o tijeras</title>
  </head>
  <body>
    <h1>Piedra, Papel o tijeras</h1>
    <script>
      //1 es piedra, 2 es papel, 3 es igual a tijeras
      let jugador = 0;
      let pc = 1;

      jugador = prompt("Elige: 1 para piedra, 2 para papel, 3 para tijera");

      switch (jugador) {
        case "1":
            alert("Elegiste piedra")
          break;
        case "2":
            alert("Elegiste papel")
          break;
        case "3":
            alert("Elegiste tijera")
          break;
        default:
            alert("Elegiste Perder")
          break;
      }
      switch (pc) {
        case 1:
            alert("Pc eligio piedra")
          break;
        case 2:
            alert("Pc eligio papel")
          break;
        case 3:
            alert("Pc eligio tijera")
          break;
      }
      switch (jugador+"-"+pc) {
        case ("1-3"):
        case ("2-1"):
        case ("3-2"):
            alert("Ganaste")
          break;
        case ("1-1"):
        case ("2-2"):
        case ("3-3"):
            alert("Empate")
            break;
          default:
            alert("Perdiste")
          break;
      }
    </script>
  </body>
</html>
