<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piedra Papel o tijeras</title>
  </head>
  <body>
    <h1>Piedra, Papel o tijeras</h1>
    <script>
      //1 es piedra, 2 es papel, 3 es igual a tijeras
      function aleatorio(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
      }

      function eleccion(jugada) {
        let resultado = "";
        if (jugada == 1) {
          resultado = "Piedra";
        } else if (jugada == 2) {
          resultado = "Papel";
        } else if (jugada == 3) {
          resultado = "Tijera";
        } else {
          resultado = "mal elegido";
        }
        return resultado;
      }

      //let objetos = ["Piedra","Papel","Tijera"]

      let jugador = 0;
      let pc = 0;
      let triunfo = 0;
      let perdidas = 0;

      while (triunfo < 3 && perdidas < 3) {
        pc = aleatorio(1,3)
        jugador = Number(prompt("Elige: 1 para piedra, 2 para papel, 3 para tijera"));

        alert("Jugador escogió " + eleccion(jugador));
        alert("PC escogió " + eleccion(pc));
        
        //Combate
        if (pc == jugador) {
          alert("Empate");
        } else if (
          (jugador == 1 && pc == 3) ||
          (jugador == 2 && pc == 1) ||
          (jugador == 3 && pc == 2)
        ) {
          alert("Ganaste");
          triunfo = triunfo + 1
        } else {
          alert("Perdiste");
          perdidas = perdidas + 1
        }
      }
      alert("Ganaste " +  triunfo + " veces. Perdiste "+ perdidas)
      //mostrar elecciones
      //alert("Jugador escogió " + objetos[jugador-1])
      //alert("PC escogió " + objetos[pc-1])
    </script>
  </body>
</html>
