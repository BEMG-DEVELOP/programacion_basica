<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piedra Papel o tijeras</title>
  </head>
  <body>
    <h1>Piedra, Papel o tijeras</h1>
    <script>
      //1 es piedra, 2 es papel, 3 es igual a tijeras
      function aleatorio(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
      }
      function combates(jugador,pc) {
         //Combate
        if (pc == jugador) {
          alert("Empate");
        } else if (
          (jugador == 1 && pc == 3) ||
          (jugador == 2 && pc == 1) ||
          (jugador == 3 && pc == 2)
        ) {
          alert("Ganaste");
          triunfo++
        } else {
          alert("Perdiste");
          perdidas++
        }
      }

      let objetos = ["Piedra","Papel","Tijera"]
      let jugador = 0;
      let pc = 0;
      let triunfo = 0;
      let perdidas = 0;

      while (triunfo < 3 && perdidas < 3) {
        pc = aleatorio(1,3)
        jugador = Number(prompt("Elige: 1 para piedra, 2 para papel, 3 para tijera"));
        
        alert("Jugador escogió " + objetos[jugador-1]);
        alert("PC escogió " + objetos[pc-1]);
        combates(jugador,pc)
      }
      alert("Ganaste " +  triunfo + " veces. Perdiste "+ perdidas)
    </script>
  </body>
</html>
